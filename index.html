<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Trust Flowers</title>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;700&family=Noto+Sans+Telugu:wght@400;600&display=swap" rel="stylesheet">
<style>
  body{margin:0;font-family:Poppins,sans-serif;background:linear-gradient(135deg,#fdfbfb,#ebedee);display:flex;justify-content:center;align-items:center;min-height:100vh}
  .poster{width:900px;max-width:95%;padding:30px;border-radius:20px;background:#fff;box-shadow:0 10px 30px rgba(0,0,0,.1);text-align:center;position:relative;overflow:hidden}
  .flower-bg{position:absolute;inset:0;background:url('https://images.unsplash.com/photo-1490750967868-88aa4486c946') center/cover no-repeat;opacity:.08}
  .content{position:relative}
  h1{color:#ff6f91;margin:0;font-size:38px}
  h2{color:#555;font-weight:400;margin:10px 0 20px}
  .telugu{font-family:'Noto Sans Telugu',sans-serif;color:#444;margin-bottom:10px}
  .section{margin:10px 0;color:#333}
  .highlight{color:#ff6f91;font-weight:700}
  .contact{margin-top:10px;font-weight:700}
  .btn{display:inline-block;margin:10px;padding:12px 20px;border-radius:25px;text-decoration:none;font-weight:600}
  .whatsapp{background:#25D366;color:#fff}
  .call{background:#ff6f91;color:#fff}
  form{margin-top:20px;text-align:left}
  input,textarea{width:100%;padding:10px;margin:8px 0;border-radius:8px;border:1px solid #ccc;font-family:Poppins}
  button{width:100%;padding:12px;background:#ff6f91;color:#fff;border:none;border-radius:25px;font-size:16px;cursor:pointer}
  button:hover{opacity:.9}
</style>
</head>
<body>
<div class="poster">
  <div class="flower-bg"></div>
  <div class="content">
    <h1>🌸 Trust Flowers 🌸</h1>
    <h2>Fresh Flowers | Decorations | Bouquets</h2>

    <div class="telugu">🌼 పెళ్లిళ్లు, బొకేలు, ప్రత్యేక పుష్ప అలంకరణలు అందుబాటులో ఉన్నాయి</div>

    <div class="section">📍 Khammam</div>
    <div class="section">🚚 <span class="highlight">Home Delivery Available</span></div>

    <div class="contact">📞 8919219415</div>

    <!-- Buttons -->
    <a class="btn whatsapp" href="https://wa.me/918919219415" target="_blank">💬 Order on WhatsApp</a>
    <a class="btn call" href="tel:8919219415">📞 Call Now</a>

    <!-- Order Form -->
    <form onsubmit="sendWhatsApp(); return false;">
      <h3>Place Your Order</h3>
      <input type="text" id="name" placeholder="Your Name" required>
      <input type="text" id="phone" placeholder="Phone Number" required>
      <textarea id="order" placeholder="Your Order Details (Bouquet / Decoration)" required></textarea>
      <button type="submit">Submit Order</button>
    </form>
  </div>
</div>

<script>
function sendWhatsApp(){
  let name=document.getElementById('name').value;
  let phone=document.getElementById('phone').value;
  let order=document.getElementById('order').value;

  let message=`Name: ${name}%0APhone: ${phone}%0AOrder: ${order}`;
  let url=`https://wa.me/918919219415?text=${message}`;

  window.open(url,'_blank');
}
</script>

</body>
</html>
