<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Trust Flowers Shop</title>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;700&display=swap" rel="stylesheet">

<style>
body{font-family:Poppins;margin:0;background:#f9f9f9}
.header{text-align:center;padding:20px;background:#ff6f91;color:#fff}
.sub{font-size:14px;margin-top:5px}
.container{padding:20px}
.grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(200px,1fr));gap:20px}
.card{background:#fff;padding:15px;border-radius:15px;box-shadow:0 5px 15px rgba(0,0,0,0.1);text-align:center}
.card img{width:100%;height:150px;object-fit:cover;border-radius:10px}
.qty{display:flex;justify-content:center;align-items:center;margin-top:10px}
.qty button{padding:5px 10px;font-size:18px}
.total{font-weight:bold;margin-top:10px}
.place-btn{margin:20px auto;display:block;padding:12px 20px;background:#25D366;color:#fff;border:none;border-radius:25px;font-size:18px;cursor:pointer}
</style>
</head>

<body>

<div class="header">
<h1>🌸 Trust Flowers 🌸</h1>
<p>Khammam | Fresh Flowers for Pooja & Decorations</p>
<div class="sub">
📞 8555826192 | 💬 WhatsApp Orders Available
</div>
</div>

<div class="container">
<div class="grid" id="flowerGrid"></div>
<button class="place-btn" onclick="placeOrder()">Place Order</button>
</div>

<script>
const flowers=[
{name:"Jasmine",price:20,img:"https://images.unsplash.com/photo-1501004318641-b39e6451bec6"},
{name:"Rose",price:10,img:"https://images.unsplash.com/photo-1518895949257-7621c3c786d7"},
{name:"Marigold",price:15,img:"https://images.unsplash.com/photo-1602928298849-325cec8771c0"},
{name:"Lotus",price:30,img:"https://images.unsplash.com/photo-1506744038136-46273834b3fb"},
{name:"Tulsi Leaves",price:10,img:"https://images.unsplash.com/photo-1615485290382-441e4d049cb5"},
{name:"Hibiscus",price:25,img:"https://images.unsplash.com/photo-1595433707802-41c7d04d7f1b"},
{name:"Kanakambaram",price:20,img:"https://images.unsplash.com/photo-1526045612212-70caf35c14df"},
{name:"Chrysanthemum",price:18,img:"https://images.unsplash.com/photo-1503023345310-bd7c1de61c7d"},
{name:"Lily",price:22,img:"https://images.unsplash.com/photo-1500530855697-b586d89ba3ee"},
{name:"Temple Garland",price:50,img:"https://images.unsplash.com/photo-1524594154908-edd9fcb6f9db"}
];

let cart={};

function render(){
let html="";
flowers.forEach((f,i)=>{
cart[i]=cart[i]||0;
html+=`
<div class="card">
<img src="${f.img}">
<h3>${f.name}</h3>
<p>₹${f.price}</p>
<div class="qty">
<button onclick="updateQty(${i},-1)">-</button>
<span id="qty${i}" style="margin:0 10px">${cart[i]}</span>
<button onclick="updateQty(${i},1)">+</button>
</div>
<div class="total">Total: ₹<span id="total${i}">${cart[i]*f.price}</span></div>
</div>`;
});
document.getElementById("flowerGrid").innerHTML=html;
}

function updateQty(i,val){
cart[i]+=val;
if(cart[i]<0) cart[i]=0;
document.getElementById("qty"+i).innerText=cart[i];
document.getElementById("total"+i).innerText=cart[i]*flowers[i].price;
}

function placeOrder(){
let message="Trust Flowers Khammam Order:%0A";
let total=0;

flowers.forEach((f,i)=>{
if(cart[i]>0){
message+=`${f.name} x ${cart[i]} = ₹${cart[i]*f.price}%0A`;
total+=cart[i]*f.price;
}
});

message+=`Total: ₹${total}`;
window.open(`https://wa.me/918555826192?text=${message}`,'_blank');
}

render();
</script>

</body>
</html>
