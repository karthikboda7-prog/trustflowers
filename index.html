<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Trust Flowers Shop</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;700&family=Noto+Sans+Telugu:wght@400;600&display=swap" rel="stylesheet">

<style>
:root{
  --primary:#ff6f91;
  --accent:#25D366;
}

body{
  font-family:Poppins;
  margin:0;
  background:linear-gradient(135deg,#fff0f5,#fef6f9);
}

.header{
  text-align:center;
  padding:40px;
  background:linear-gradient(135deg,#ff6f91,#ff8fab);
  color:#fff;
}

.about{
  padding:30px;
  text-align:center;
  background:#fff;
  margin:20px;
  border-radius:20px;
  box-shadow:0 5px 15px rgba(0,0,0,0.1);
}

.container{padding:20px}

.grid{
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(220px,1fr));
  gap:25px;
}

.card{
  background:#fff;
  padding:15px;
  border-radius:20px;
  box-shadow:0 10px 25px rgba(0,0,0,0.1);
  text-align:center;
  transition:0.3s;
}

.card:hover{
  transform:translateY(-8px) scale(1.03);
}

.card img{
  width:100%;
  height:160px;
  object-fit:cover;
  border-radius:15px;
}

.telugu{
  font-family:'Noto Sans Telugu';
  color:#666;
  font-size:14px;
}

.qty{
  display:flex;
  justify-content:center;
  align-items:center;
  margin-top:10px;
}

.qty button{
  padding:6px 12px;
  border:none;
  background:var(--primary);
  color:#fff;
  border-radius:50%;
  cursor:pointer;
}

.total{
  color:var(--primary);
  font-weight:bold;
  margin-top:10px;
}

.place-btn{
  margin:30px auto;
  display:block;
  padding:15px 25px;
  background:var(--accent);
  color:#fff;
  border:none;
  border-radius:30px;
  font-size:18px;
  cursor:pointer;
}

.modal{
  display:none;
  position:fixed;
  top:0;
  left:0;
  width:100%;
  height:100%;
  background:rgba(0,0,0,0.6);
  justify-content:center;
  align-items:center;
}

.modal-content{
  background:#fff;
  padding:25px;
  border-radius:20px;
  width:300px;
}

.modal input{
  width:100%;
  padding:10px;
  margin:8px 0;
  border-radius:10px;
  border:1px solid #ccc;
}

.modal button{
  width:100%;
  padding:12px;
  background:var(--primary);
  color:#fff;
  border:none;
  border-radius:25px;
}
</style>
</head>

<body>

<div class="header">
<h1>🌸 Trust Flowers 🌸</h1>
<p>Khammam | Fresh Flowers & Decorations</p>
<p>📞 8555826192</p>
</div>

<div class="about">
<h2>About Us</h2>
<p><b>Owner:</b> D. Vignesh</p>
<p><b>Location:</b> Khammam</p>
<p>🌼 పూజా పూలు, పూలమాలలు అందుబాటులో ఉన్నాయి</p>
</div>

<div class="container">
<h2 style="text-align:center;color:#ff6f91">Select Flowers</h2>
<div class="grid" id="flowerGrid"></div>
<button class="place-btn" onclick="openForm()">Place Order</button>
</div>

<div class="modal" id="formModal">
<div class="modal-content">
<h3>Delivery Details</h3>
<input type="text" id="custName" placeholder="Name">
<input type="text" id="custPhone" placeholder="Phone">
<input type="text" id="custAddress" placeholder="Address">
<button onclick="placeOrder()">Confirm Order</button>
</div>
</div>

<script>
const flowers=[
{name:"Jasmine",telugu:"మల్లె పువ్వు",price:20,img:"https://images.unsplash.com/photo-1649674635709-a08fae8d64fb"},
{name:"Rose",telugu:"గులాబీ",price:10,img:"https://images.unsplash.com/photo-1616844868137-7ffaf43c2d80"},
{name:"Marigold",telugu:"బంతి పువ్వు",price:15,img:"https://images.unsplash.com/photo-1696324635500-10785ee184b5"},
{name:"Lotus",telugu:"తామర పువ్వు",price:30,img:"https://images.unsplash.com/photo-1534162802244-d6f69e9048da"},
{name:"Tulsi Leaves",telugu:"తులసి ఆకులు",price:10,img:"https://images.unsplash.com/photo-1665479754958-1a8bdc47cc0d?w=600&auto=format&fit=crop&q=60"},
{name:"Hibiscus",telugu:"మందారం",price:25,img:"https://images.unsplash.com/photo-1567990989224-6441e1483ac8"},
{name:"Kanakambaram",telugu:"కనకాంబరం",price:20,img:"https://images.unsplash.com/photo-1696613755416-6b60e780e6e9"},
{name:"Chrysanthemum",telugu:"చామంతి",price:18,img:"https://images.unsplash.com/photo-1697816683790-fdcc57fee696"},
{name:"Lily",telugu:"లిల్లీ",price:22,img:"https://images.unsplash.com/photo-1561897519-6e4fbd1fbc41"},
{name:"Temple Garland",telugu:"పూలమాల",price:50,img:"https://images.unsplash.com/photo-1560505605-f300b17028d6"}
];

let cart={};

function render(){
let html="";
flowers.forEach((f,i)=>{
cart[i]=cart[i]||0;
html+=`
<div class="card">
<img src="${f.img}">
<h3>${f.name}</h3>
<p class="telugu">${f.telugu}</p>
<p>₹${f.price}</p>
<div class="qty">
<button onclick="updateQty(${i},-1)">-</button>
<span>${cart[i]}</span>
<button onclick="updateQty(${i},1)">+</button>
</div>
<div class="total">₹${cart[i]*f.price}</div>
</div>`;
});
document.getElementById("flowerGrid").innerHTML=html;
}

function updateQty(i,val){
cart[i]+=val;
if(cart[i]<0) cart[i]=0;
render();
}

function openForm(){
document.getElementById("formModal").style.display="flex";
}

function placeOrder(){
let name=document.getElementById("custName").value;
let phone=document.getElementById("custPhone").value;
let address=document.getElementById("custAddress").value;

let message=`Name: ${name}%0APhone: ${phone}%0AAddress: ${address}%0A%0AOrder:%0A`;
let total=0;

flowers.forEach((f,i)=>{
if(cart[i]>0){
message+=`${f.name} x ${cart[i]} = ₹${cart[i]*f.price}%0A`;
total+=cart[i]*f.price;
}
});

message+=`Total: ₹${total}`;
window.open(`https://wa.me/918555826192?text=${message}`,'_blank');
}

render();
</script>

</body>
</html>
